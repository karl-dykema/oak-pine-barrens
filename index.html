<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oak-Pine Barrens Restoration Project</title>
    <meta name="description" content="A 40-acre oak-pine barrens restoration in Newaygo County, Michigan — field journal, photo gallery, and species monitoring." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- GoatCounter analytics — no cookies, no GDPR banner needed -->
    <script data-goatcounter="https://oak-pine-barrens.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <!-- Netlify Identity: handles email confirmation redirects -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', (user) => {
          // After email confirmation the widget lands back on the main site —
          // redirect to /admin/ so the CMS opens automatically.
          if (!user) {
            window.netlifyIdentity.on('login', () => {
              if (window.location.pathname !== '/admin/') {
                document.location.href = '/admin/'
              }
            })
          }
        })
      }
    </script>
  </body>
</html>
